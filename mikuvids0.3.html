 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MikuVids 2005</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #e9e9e9;
    }

    /* TOP BAR */
    #topbar {
        background: #ffffff;
        border-bottom: 2px solid #cccccc;
        padding: 10px;
        display: flex;
        align-items: center;
        gap: 20px;
    }

    #logo {
        font-size: 28px;
        font-weight: bold;
        color: #cc0000;
    }

    #search-box {
        flex: 1;
        display: flex;
        gap: 5px;
    }

    #search-input {
        width: 100%;
        padding: 6px;
        border: 1px solid #999;
    }

    #search-btn {
        padding: 6px 12px;
        background: #ddd;
        border: 1px solid #999;
        cursor: pointer;
    }

    /* OLD YOUTUBE BUTTON BAR */
    #button-bar {
        background: #f2f2f2;
        border-bottom: 1px solid #ccc;
        padding: 8px;
        display: flex;
        gap: 15px;
        font-size: 14px;
    }

    .yt-btn {
        cursor: pointer;
        color: #0033cc;
        text-decoration: underline;
    }

    /* LAYOUT */
    #layout {
        display: flex;
    }

    /* SIDEBAR */
    #sidebar {
        width: 180px;
        background: #ffffff;
        border-right: 1px solid #ccc;
        padding: 10px;
    }

    .side-btn {
        display: block;
        padding: 6px;
        margin-bottom: 6px;
        background: #f7f7f7;
        border: 1px solid #ccc;
        cursor: pointer;
        text-align: center;
    }

    /* VIDEO GRID */
    #content {
        flex: 1;
        padding: 15px;
    }

    #video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 15px;
    }

    .video-card {
        background: #ffffff;
        border: 1px solid #ccc;
        padding: 8px;
    }

    .video-title {
        font-size: 14px;
        font-weight: bold;
        margin-top: 5px;
    }

    .video-meta {
        font-size: 12px;
        color: #555;
    }
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
    <div id="logo">MikuVids</div>

    <div id="search-box">
        <input id="search-input" type="text" placeholder="Search videos...">
        <button id="search-btn">Search</button>
    </div>
</div>

<!-- OLD YOUTUBE BUTTON BAR -->
<div id="button-bar">

    <div class="yt-btn" onclick="openTop39()">Top 39</div>
    <div class="yt-btn" onclick="openUpload()">Upload</div>
    <div class="yt-btn" onclick="openProfile()">Profile</div>
</div>

<!-- LAYOUT -->
<div id="layout">

    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="side-btn" onclick="goHome()">Home</div>
        <div class="side-btn" onclick="filterCategory('mmd')">MMD Videos</div>

        <div class="side-btn" onclick="openUpload()">Upload</div>
        <div class="side-btn" onclick="openProfile()">Profile</div>
    </div>

    <!-- CONTENT -->
    <div id="content">
        <div id="video-grid"></div>
    </div>

</div>

<script>
window.onload = function() {

    const videos = [
        { title: "Miku - World is Mine (MMD)", tags: "mmd vocaloid miku", creator: "HatsuneStudio" },
        { title: "Kasane Teto - Kasane Territory", tags: "utau teto", creator: "UTAUWorks" },
        { title: "Gumi - Echo Cover", tags: "vocaloid gumi cover", creator: "GreenVoice" },
        { title: "Miku x Luka - Magnet", tags: "mmd vocaloid duet", creator: "TwinCreators" }
    ];

    const grid = document.getElementById("video-grid");

    function renderVideos(list) {
        grid.innerHTML = "";
        list.forEach(v => {
            grid.innerHTML += `
                <div class="video-card">
                    <div class="video-title">${v.title}</div>
                    <div class="video-meta">${v.creator}</div>
                </div>
            `;
        });
    }

    renderVideos(videos);

    // SEARCH
    document.getElementById("search-btn").onclick = function() {
        const q = document.getElementById("search-input").value.toLowerCase();
        const filtered = videos.filter(v =>
            v.title.toLowerCase().includes(q) ||
            v.tags.toLowerCase().includes(q) ||
            v.creator.toLowerCase().includes(q)
        );
        renderVideos(filtered);
    };

    // CATEGORY FILTER
    window.filterCategory = function(cat) {
        const filtered = videos.filter(v => v.tags.includes(cat));
        renderVideos(filtered);
    };

    // BUTTONS
    window.goHome = function() {
        renderVideos(videos);
    };

    window.openTop39 = function() {
        alert("Top 39 page coming soon!");
    };

    window.openUpload = function() {
        alert("Upload page coming soon!");
    };

    window.openProfile = function() {
        alert("Profile page coming soon!");
    };

};
</script>
